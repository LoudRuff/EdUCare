<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduSolve AI</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
:root {
    --primary: #00628c;
    --primary-container: #34b5fa;
    --on-primary: #ffffff;
    --on-primary-container: #001e2f;
    --secondary: #6f5900;
    --secondary-container: #fed01b;
    --on-secondary-container: #594700;
    --tertiary: #006a34;
    --tertiary-container: #6dfe9c;
    --on-tertiary-container: #00210b;
    --background: #f1f7ff;
    --on-background: #04324c;
    --surface: #f1f7ff;
    --surface-container-lowest: #ffffff;
    --surface-container-low: #e7f2ff;
    --surface-container: #d7eaff;
    --on-surface: #04324c;
    --on-surface-variant: #3b5f7c;
    --outline-variant: rgba(87, 122, 153, 0.2);
    --font-headline: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'Be Vietnam Pro', sans-serif;
    --radius-full: 9999px;
    --radius-default: 1rem;
}

body {
    background-color: var(--background);
    color: var(--on-background);
    font-family: var(--font-body);
    text-align: center;
    padding: 40px;
}

h1 {
    font-family: var(--font-headline);
}

.search-bar {
    max-width: 650px;
    margin: auto;
    display: flex;
    align-items: center;
    background: var(--surface-container-lowest);
    padding: 10px;
    border-radius: var(--radius-full);
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
}

.search-input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 12px;
    font-size: 18px;
    outline: none;
    color: var(--on-surface);
}

.solve-btn {
    background: linear-gradient(135deg, var(--primary), var(--primary-container));
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: var(--radius-full);
    font-weight: 700;
    cursor: pointer;
}

#result {
    max-width: 650px;
    margin: 30px auto;
    font-size: 18px;
    text-align: left;
    color: var(--on-surface);
}
</style>
</head>

<body>

<h1>EduSolve AI</h1>

<div class="search-bar">
    <input id="questionInput" class="search-input" placeholder="Paste your question or ask anything..." />
    <button id="askBtn" class="solve-btn">Solve</button>
</div>

<div id="result"></div>

<script>
const input = document.getElementById("questionInput");
const button = document.getElementById("askBtn");
const resultDiv = document.getElementById("result");

async function askAI() {
    const question = input.value;
    if (!question) return;
    resultDiv.innerHTML = "Thinking...";
    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ question })
        });
        const data = await res.json();
        resultDiv.innerHTML = data.answer;
    } catch (err) {
        resultDiv.innerHTML = "Error";
    }
}

button.addEventListener("click", askAI);

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") askAI();
});
</script>

</body>
</html>
